version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: emotion-backend
    ports:
      - "8000:8000"
    volumes:
      - emotion_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/emotions.db
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: emotion-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  emotion_data:
